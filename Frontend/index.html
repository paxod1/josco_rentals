  <!-- Automatic Recovery Script for "Blank Screen" Issues -->
  <script>
    (function () {
      // Config
      const RECOVERY_TIMEOUT = 6000; // 6 seconds
      const COOKIES_TO_CLEAR = ['authToken', 'user'];

      function clearAndReload(reason) {
        console.error('CRITICAL: App recovery triggered. Reason:', reason);

        // 1. Clear Cookies
        const cookies = document.cookie.split(";");
        for (let i = 0; i < cookies.length; i++) {
          const cookie = cookies[i];
          const eqPos = cookie.indexOf("=");
          const name = eqPos > -1 ? cookie.substr(0, eqPos).trim() : cookie.trim();
          document.cookie = name + '=; Path=/; Expires=Thu, 01 Jan 1970 00:00:01 GMT;';
          document.cookie = name + '=; Path=/; Domain=' + window.location.hostname + '; Expires=Thu, 01 Jan 1970 00:00:01 GMT;';
        }

        // 2. Clear LocalStorage & SessionStorage
        try {
          localStorage.clear();
          sessionStorage.clear();
        } catch (e) { }

        // 3. Unregister Service Workers
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(registrations => {
            for (let registration of registrations) {
              registration.unregister();
            }
          }).catch(() => { });
        }

        // 4. Redirect to /login
        // We add a param to prevent infinite reload loops
        if (!window.location.search.includes('recovered=true')) {
          window.location.replace('/login?recovered=true');
        }
      }

      // Track if main bundle loaded
      window.__MAIN_BUNDLE_LOADED__ = false;

      // Listen for script/asset loading errors
      window.addEventListener('error', function (e) {
        if (e.target && (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK')) {
          const src = e.target.src || e.target.href;
          // Trigger recovery for any script/link failure on the live site
          clearAndReload('Asset loading failed (MIME type or 404): ' + src);
        }
      }, true);

      // Check for mount failure after timeout
      setTimeout(function () {
        const root = document.getElementById('root');
        if (!window.__MAIN_BUNDLE_LOADED__ || (root && root.innerHTML === '')) {
          // If the URL already has recovered=true, don't reload again to prevent loops
          if (!window.location.search.includes('recovered=true')) {
            clearAndReload('App failed to mount or bundle failed to execute');
          }
        }
      }, RECOVERY_TIMEOUT);
    })();
  </script>

<body>
